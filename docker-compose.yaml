services:
  mariadb:
    image: 'mariadb:12'
    restart: on-failure
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=1
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_redmine
      - MARIADB_DATABASE=bitnami_redmine
      - MARIADB_PASSWORD=test1234!
  redmine:
    restart: on-failure
    ports:
      - '8080:3000'

volumes:
  redmine_data:
    driver: local
  mariadb_data:
    driver: local
